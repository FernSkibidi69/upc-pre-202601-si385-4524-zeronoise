<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Mapa de puntos críticos</title>
    <link rel="stylesheet" href="css/mapa_criticos.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Ciudadano</div>

      <nav class="sidebar-nav">
        <a href="index-ciudadano.html#sec-medir" class="side-link">
          <span class="icon">🎙️</span> Medición
        </a>
        <a href="index-ciudadano.html#sec-mapa" class="side-link">
          <span class="icon">🗺️</span> Mapa
        </a>
        <a href="index-ciudadano.html#sec-reportes" class="side-link">
          <span class="icon">📋</span> Reportes
        </a>
        <a href="index-ciudadano.html#sec-historial" class="side-link">
          <span class="icon">🕓</span> Historial
        </a>
        <a href="index-ciudadano.html#sec-perfil" class="side-link">
          <span class="icon">👤</span> Perfil
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Mapa de puntos críticos</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Hola, <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <div class="map-container">
          <h2>Mapa de puntos críticos</h2>
          <p class="subtitle">
            Zonas donde te expusiste a ruido peligroso durante tus caminatas.
          </p>

          <!-- Filtro por fecha (Escenario 2) -->
          <div class="filter-row">
            <label for="dateFilter">Filtrar por día</label>
            <select id="dateFilter" onchange="filterByDate()">
              <option value="all">Toda la semana</option>
              <option value="lunes">Lunes</option>
              <option value="martes">Martes</option>
              <option value="miercoles">Miércoles</option>
              <option value="jueves">Jueves</option>
              <option value="viernes">Viernes</option>
            </select>
          </div>

          <!-- Mapa simulado con segmentos de ruta -->
          <div class="map-wrapper">
            <svg
              id="routeMap"
              viewBox="0 0 400 300"
              xmlns="http://www.w3.org/2000/svg"
            ></svg>
          </div>

          <div class="legend-row">
            <div class="legend-item"><span class="dot verde"></span> Bajo</div>
            <div class="legend-item">
              <span class="dot amarillo"></span> Moderado
            </div>
            <div class="legend-item">
              <span class="dot naranja"></span> Alto
            </div>
            <div class="legend-item">
              <span class="dot rojo"></span> &gt;80 dB (Crítico)
            </div>
          </div>

          <div class="segments-list" id="segmentsList"></div>
        </div>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("ciudadano");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/mapa_criticos.js"></script>
  </body>
</html>
