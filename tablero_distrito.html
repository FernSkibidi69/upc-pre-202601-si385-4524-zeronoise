<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Tablero por distrito</title>
    <link rel="stylesheet" href="css/tablero_distrito.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Municipal</div>

      <nav class="sidebar-nav">
        <a href="index-municipalidad.html#sec-fiscalizacion" class="side-link">
          <span class="icon">🚨</span> Fiscalización
        </a>
        <a href="index-municipalidad.html#sec-analitica" class="side-link">
          <span class="icon">📊</span> Analítica
        </a>
        <a href="index-municipalidad.html#sec-administracion" class="side-link">
          <span class="icon">⚙️</span> Administración
        </a>
        <a href="index-municipalidad.html#sec-comunicacion" class="side-link">
          <span class="icon">💬</span> Comunicación
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Tablero por distrito</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Funcionario: <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <div class="dashboard-container">
          <h2>Tablero de niveles de ruido</h2>
          <p class="subtitle">Distrito de Lima - Vista por cuadras</p>

          <div class="controls-row">
            <button
              class="view-toggle active"
              id="btnBlocks"
              onclick="setView('blocks')"
            >
              Vista por cuadras
            </button>
            <button
              class="view-toggle"
              id="btnRanking"
              onclick="setView('ranking')"
            >
              Puntos críticos
            </button>
          </div>

          <!-- Escenario 1: Calor por cuadras -->
          <div class="view-panel show" id="blocksView">
            <div class="map-wrapper">
              <svg
                id="blocksMap"
                viewBox="0 0 400 260"
                xmlns="http://www.w3.org/2000/svg"
              ></svg>
            </div>
            <div class="legend-row">
              <div class="legend-item">
                <span class="dot verde"></span> Bajo
              </div>
              <div class="legend-item">
                <span class="dot amarillo"></span> Moderado
              </div>
              <div class="legend-item">
                <span class="dot naranja"></span> Alto
              </div>
              <div class="legend-item">
                <span class="dot rojo"></span> Muy alto
              </div>
            </div>
          </div>

          <!-- Escenario 2: Ranking de puntos críticos -->
          <div class="view-panel" id="rankingView">
            <div class="ranking-list" id="rankingList"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("funcionario");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/tablero_distrito.js"></script>
  </body>
</html>
