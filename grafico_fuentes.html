<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Fuentes de ruido</title>
    <link rel="stylesheet" href="css/grafico_fuentes.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Municipal</div>

      <nav class="sidebar-nav">
        <a href="index-municipalidad.html#sec-fiscalizacion" class="side-link">
          <span class="icon">🚨</span> Fiscalización
        </a>
        <a href="index-municipalidad.html#sec-analitica" class="side-link">
          <span class="icon">📊</span> Analítica
        </a>
        <a href="index-municipalidad.html#sec-administracion" class="side-link">
          <span class="icon">⚙️</span> Administración
        </a>
        <a href="index-municipalidad.html#sec-comunicacion" class="side-link">
          <span class="icon">💬</span> Comunicación
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Fuentes de ruido</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Funcionario: <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <div class="sources-container">
          <h2>Fuentes de ruido</h2>
          <p class="subtitle">Tipos de fuente más frecuentes del último mes.</p>

          <div class="controls-row">
            <button
              class="view-toggle active"
              id="btnPie"
              onclick="setView('pie')"
            >
              Distribución
            </button>
            <button
              class="view-toggle"
              id="btnTrend"
              onclick="setView('trend')"
            >
              Ver evolución
            </button>
          </div>

          <!-- Escenario 1: Último mes (gráfico de torta) -->
          <div class="view-panel show" id="pieView">
            <div class="pie-wrapper">
              <svg
                id="pieChart"
                viewBox="0 0 200 200"
                xmlns="http://www.w3.org/2000/svg"
              ></svg>
            </div>
            <div class="pie-legend" id="pieLegend"></div>
          </div>

          <!-- Escenario 2: Ver tendencia (barras apiladas por semana) -->
          <div class="view-panel" id="trendView">
            <svg
              id="stackedChart"
              viewBox="0 0 320 200"
              xmlns="http://www.w3.org/2000/svg"
            ></svg>
          </div>
        </div>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("funcionario");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/grafico_fuentes.js"></script>
  </body>
</html>
