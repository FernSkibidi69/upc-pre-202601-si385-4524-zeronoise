<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Notificaciones masivas</title>
    <link rel="stylesheet" href="css/notificaciones_masivas.css" />
  </head>
  <body>
    <div class="campaign-container">
      <div class="logo">🔊 NoiseGuard</div>
      <h2>Notificaciones push masivas</h2>
      <p class="subtitle">Envía campañas educativas sobre riesgos del ruido.</p>

      <div class="form-group">
        <label for="campaignName">Nombre de la campaña</label>
        <input type="text" id="campaignName" value="Semana del Silencio" />
      </div>

      <div class="form-group">
        <label for="campaignMsg">Mensaje</label>
        <textarea id="campaignMsg" rows="3">
La exposición prolongada al ruido puede afectar tu salud. Conoce cómo cuidarte esta semana.</textarea
        >
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="sendDate">Fecha de envío</label>
          <input type="date" id="sendDate" value="2026-07-13" />
        </div>
        <div class="form-group half">
          <label for="sendTime">Hora</label>
          <input type="time" id="sendTime" value="09:00" />
        </div>
      </div>

      <!-- Escenario 2: Enfoque por distrito -->
      <div class="form-group">
        <label for="targetDistrict">Alcance</label>
        <select id="targetDistrict" onchange="updateReach()">
          <option value="all">Todos los usuarios</option>
          <option value="lince">Solo distrito: Lince</option>
          <option value="san_isidro">Solo distrito: San Isidro</option>
          <option value="miraflores">Solo distrito: Miraflores</option>
        </select>
      </div>

      <div class="reach-preview" id="reachPreview">
        Esta campaña llegará a <strong id="reachCount">50,000</strong> usuarios.
      </div>

      <button class="send-btn" onclick="sendCampaign()">Programar envío</button>

      <!-- Escenario 1: Confirmación de envío -->
      <div class="msg success" id="msgCampaignSuccess">
        Campaña programada correctamente. Se enviará a
        <span id="finalReachCount"></span> usuarios.
      </div>
    </div>

    <script src="js/notificaciones_masivas.js"></script>
  </body>
</html>
