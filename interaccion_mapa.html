<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Publicaciones del mapa</title>
    <link rel="stylesheet" href="css/interaccion_mapa.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Ciudadano</div>

      <nav class="sidebar-nav">
        <a href="index-ciudadano.html#sec-medir" class="side-link">
          <span class="icon">🎙️</span> Medición
        </a>
        <a href="index-ciudadano.html#sec-mapa" class="side-link">
          <span class="icon">🗺️</span> Mapa
        </a>
        <a href="index-ciudadano.html#sec-reportes" class="side-link">
          <span class="icon">📋</span> Reportes
        </a>
        <a href="index-ciudadano.html#sec-historial" class="side-link">
          <span class="icon">🕓</span> Historial
        </a>
        <a href="index-ciudadano.html#sec-perfil" class="side-link">
          <span class="icon">👤</span> Perfil
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Publicaciones del mapa</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Hola, <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <section class="sec-interaccion">
          <div class="div-gral-interaccion">
            <div class="interaccion-texto">
              <h2>Publicaciones del mapa</h2>
              <p>
                Consulta el detalle de las publicaciones de ruido reportadas por
                otros vecinos en tu zona.
              </p>
            </div>

            <div class="publicaciones-lista" id="publicacionesLista"></div>

            <!-- Detalle expandido -->
            <div class="detalle-card" id="detalleCard" style="display: none">
              <div class="detalle-header">
                <h4 id="detalleZona">--</h4>
                <button class="cerrar-detalle" onclick="cerrarDetalle()">
                  ✕
                </button>
              </div>
              <p id="detalleTexto">--</p>
              <div class="detalle-meta">
                <div>
                  <span>Nivel</span><strong id="detalleDb">-- dB</strong>
                </div>
                <div>
                  <span>Estado</span><strong id="detalleEstado">--</strong>
                </div>
                <div><span>Hora</span><strong id="detalleHora">--</strong></div>
              </div>
              <div class="detalle-acciones">
                <button class="btn-evidencia-mini" onclick="agregarEvidencia()">
                  Evidencia +1
                </button>
                <button
                  class="btn-reportar-mini"
                  onclick="reportarPublicacion()"
                >
                  Reportar
                </button>
              </div>
              <div class="mensaje-confirmacion" id="msgAccion"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("ciudadano");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/interaccion_mapa.js"></script>
  </body>
</html>
