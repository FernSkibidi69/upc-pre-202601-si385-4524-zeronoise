<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Evidencia audiovisual</title>
    <link rel="stylesheet" href="css/evidencia_audiovisual.css" />
  </head>
  <body>
    <section class="sec-evidencia">
      <div class="div-gral-evidencia">
        <div class="evidencia-texto">
          <h2>Evidencia audiovisual</h2>
          <p>
            Adjunta una foto o video de la fuente de ruido para respaldar tu
            reporte ante la municipalidad.
          </p>
        </div>

        <div class="evidencia-card">
          <div class="campo-reporte">
            <label for="archivo-evidencia">Adjuntar foto o video</label>
            <input
              type="file"
              id="archivo-evidencia"
              accept="image/*,video/*"
              onchange="cargarArchivo()"
            />
          </div>

          <div class="opciones-row">
            <button class="btn-evidencia" onclick="simularFoto()">
              📷 Adjuntar foto
            </button>
            <button class="btn-evidencia" onclick="simularVideo()">
              🎥 Grabar video (10s)
            </button>
          </div>

          <div class="attachment-preview" id="preview"></div>
        </div>
      </div>
    </section>

    <script src="js/evidencia_audiovisual.js"></script>
  </body>
</html>
