<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Evidencia audiovisual</title>
    <link rel="stylesheet" href="css/evidencia_audiovisual.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Ciudadano</div>

      <nav class="sidebar-nav">
        <a href="index-ciudadano.html#sec-medir" class="side-link">
          <span class="icon">🎙️</span> Medición
        </a>
        <a href="index-ciudadano.html#sec-mapa" class="side-link">
          <span class="icon">🗺️</span> Mapa
        </a>
        <a href="index-ciudadano.html#sec-reportes" class="side-link">
          <span class="icon">📋</span> Reportes
        </a>
        <a href="index-ciudadano.html#sec-historial" class="side-link">
          <span class="icon">🕓</span> Historial
        </a>
        <a href="index-ciudadano.html#sec-perfil" class="side-link">
          <span class="icon">👤</span> Perfil
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Evidencia audiovisual</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Hola, <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <section class="sec-evidencia">
          <div class="div-gral-evidencia">
            <div class="evidencia-texto">
              <h2>Evidencia audiovisual</h2>
              <p>
                Adjunta una foto o video de la fuente de ruido para respaldar tu
                reporte ante la municipalidad.
              </p>
            </div>

            <div class="evidencia-card">
              <div class="campo-reporte">
                <label for="archivo-evidencia">Adjuntar foto o video</label>
                <input
                  type="file"
                  id="archivo-evidencia"
                  accept="image/*,video/*"
                  onchange="cargarArchivo()"
                />
              </div>

              <div class="opciones-row">
                <button class="btn-evidencia" onclick="simularFoto()">
                  📷 Adjuntar foto
                </button>
                <button class="btn-evidencia" onclick="simularVideo()">
                  🎥 Grabar video (10s)
                </button>
              </div>

              <div class="attachment-preview" id="preview"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("ciudadano");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/evidencia_audiovisual.js"></script>
  </body>
</html>
