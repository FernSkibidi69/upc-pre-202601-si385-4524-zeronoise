<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiseGuard - Estado del reporte</title>
<link rel="stylesheet" href="css/mensaje_automatico.css">
</head>
<body>

<div class="status-container">
  <div class="logo">🔊 NoiseGuard</div>
  <h2>Detalle del reporte</h2>
  <p class="subtitle">Av. Javier Prado 450, San Isidro</p>

  <div class="status-current">
    <span class="status-badge" id="statusBadge">Recibido</span>
  </div>

  <!-- Simulación: el inspector cambia el estado a "Atendido" -->
  <button class="admin-btn" onclick="markAsAttended()">
    (Inspector) Marcar como atendido
  </button>

  <!-- Escenario 1: Notificación automática al ciudadano -->
  <div class="notification-card" id="notifCard">
    <span class="notif-icon">🔔</span>
    <div class="notif-text">
      La municipalidad atendió tu reporte en <strong>Av. Javier Prado 450, San Isidro</strong>.
    </div>
  </div>

  <!-- Escenario 2: Ciudadano insatisfecho -->
  <div class="feedback-panel" id="feedbackPanel">
    <p class="feedback-question">¿Estás conforme con la atención brindada?</p>
    <div class="feedback-buttons">
      <button class="feedback-btn ok" onclick="closeSatisfied()">Sí, conforme</button>
      <button class="feedback-btn reopen" onclick="openReopenForm()">No, reabrir reporte</button>
    </div>

    <div class="reopen-form" id="reopenForm">
      <label for="reopenReason">Explica por qué</label>
      <textarea id="reopenReason" rows="3" placeholder="El ruido continúa igual que antes..."></textarea>
      <button class="reopen-submit" onclick="submitReopen()">Reabrir reporte</button>
    </div>

    <div class="msg success" id="msgReopened">
      Reporte reabierto. La municipalidad revisará tu comentario.
    </div>
  </div>
</div>

<script src="js/mensaje_automatico.js"></script>
</body>
</html>
