<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoiseGuard - Registro e Inicio de Sesión</title>
  <link rel="stylesheet" href="he_registro.css">
</head>
<body>

  <div class="auth-box">
    <div id="vista-registro">
      <h2>Registro de Ciudadano</h2>
      <form id="form-registro">
        <div class="campo">
          <label for="reg-nombre">Nombre Completo</label>
          <input type="text" id="reg-nombre" required placeholder="Juan Pérez">
        </div>
        <div class="campo">
          <label for="reg-email">Correo Electrónico</label>
          <input type="email" id="reg-email" required placeholder="correo@ciudadano.com">
        </div>
        <div class="campo">
          <label for="reg-pass">Contraseña</label>
          <input type="password" id="reg-pass" required placeholder="Mínimo 6 caracteres">
        </div>
        <button type="submit" class="btn-primary">Crear Cuenta</button>
      </form>
      <div class="toggle-link">
        ¿Ya tienes cuenta? <a href="#" id="link-ir-login">Inicia Sesión aquí</a>
      </div>
    </div>

    <div id="vista-login" style="display: none;">
      <h2>Inicio de Sesión</h2>
      <form id="form-login">
        <div class="campo">
          <label for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" required placeholder="correo@ciudadano.com">
        </div>
        <div class="campo">
          <label for="login-pass">Contraseña</label>
          <input type="password" id="login-pass" required placeholder="********">
        </div>
        <button type="submit" class="btn-secondary">Ingresar</button>
      </form>
      <div class="toggle-link">
        ¿No tienes cuenta? <a href="#" id="link-ir-registro">Regístrate aquí</a>
      </div>
    </div>

    <a href="index.html" class="btn-volver">← Volver a la página principal</a>
  </div>

  <script src="auth_logica.js"></script>
</body>
</html>
