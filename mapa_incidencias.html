<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Mapa de incidencias</title>
    <link rel="stylesheet" href="css/mapa_incidencias.css" />
  </head>
  <body>
    <div class="incidents-container">
      <div class="logo">🔊 NoiseGuard</div>
      <h2>Mapa de fiscalización</h2>
      <p class="subtitle">
        Incidencias reportadas por ciudadanos en tu distrito.
      </p>

      <!-- Escenario 2: Filtro por antigüedad -->
      <div class="filter-row">
        <label class="checkbox-label">
          <input
            type="checkbox"
            id="filterOldToggle"
            onchange="applyFilter()"
          />
          Solo incidencias con más de 7 días
        </label>
      </div>

      <!-- Escenario 1: Incidencias pendientes (rojo) / atendidas (verde) -->
      <div class="map-wrapper">
        <svg
          id="incidentsMap"
          viewBox="0 0 400 260"
          xmlns="http://www.w3.org/2000/svg"
        ></svg>
      </div>

      <div class="legend-row">
        <div class="legend-item">
          <span class="dot rojo"></span> No atendido
        </div>
        <div class="legend-item"><span class="dot verde"></span> Atendido</div>
      </div>

      <div class="incidents-list" id="incidentsList"></div>
    </div>

    <script src="js/mapa_incidencias.js"></script>
  </body>
</html>
