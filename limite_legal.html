<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Límite legal de ruido</title>
    <link rel="stylesheet" href="css/limite_legal.css" />
    <link rel="stylesheet" href="css/sidebar_global.css" />
  </head>
  <body>
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="images/logo.png" alt="NoiseGuard" class="brand-logo" />
      </div>
      <div class="sidebar-role">Panel Ciudadano</div>

      <nav class="sidebar-nav">
        <a href="index-ciudadano.html#sec-medir" class="side-link">
          <span class="icon">🎙️</span> Medición
        </a>
        <a href="index-ciudadano.html#sec-mapa" class="side-link">
          <span class="icon">🗺️</span> Mapa
        </a>
        <a href="index-ciudadano.html#sec-reportes" class="side-link">
          <span class="icon">📋</span> Reportes
        </a>
        <a href="index-ciudadano.html#sec-historial" class="side-link">
          <span class="icon">🕓</span> Historial
        </a>
        <a href="index-ciudadano.html#sec-perfil" class="side-link">
          <span class="icon">👤</span> Perfil
        </a>
      </nav>

      <a href="cerrar_sesion.html" class="sidebar-logout">🚪 Cerrar sesión</a>
    </aside>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="main-area">
      <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 class="topbar-title">Límite legal de ruido</h1>
        <div class="topbar-user">
          <span class="user-greeting"
            >Hola, <strong id="userNombre">Usuario</strong></span
          >
          <div class="user-avatar" id="userAvatar">--</div>
        </div>
      </header>

      <main class="content">
        <div class="legal-container">
          <h2>Límite legal de ruido</h2>
          <p class="subtitle">
            Consulta el límite permitido según tu zona y compáralo con tu
            medición actual.
          </p>

          <!-- Escenario 1: Zona residencial (detectada por geolocalización simulada) -->
          <div class="zone-card">
            <div class="zone-type" id="zoneType">Zona residencial</div>
            <div class="zone-limits">
              <div class="limit-item">
                <span class="limit-label">Día</span>
                <span class="limit-value" id="limitDay">60 dB</span>
              </div>
              <div class="limit-item">
                <span class="limit-label">Noche</span>
                <span class="limit-value" id="limitNight">50 dB</span>
              </div>
            </div>
          </div>

          <div class="measure-row">
            <label for="currentDb">Tu medición actual (dB)</label>
            <input type="number" id="currentDb" value="75" min="0" max="140" />
            <button class="check-btn" onclick="checkLegalLimit()">
              Comparar con límite legal
            </button>
          </div>

          <!-- Escenario 2: Ruido ilegal -->
          <div class="result-box" id="resultBox"></div>
        </div>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
      const session = requireRole("ciudadano");
      if (session) {
        document.getElementById("userNombre").textContent = session.nombre;
        document.getElementById("userAvatar").textContent = getIniciales(
          session.nombre
        );
      }
    </script>
    <script src="js/sidebar_global.js"></script>
    <script src="js/limite_legal.js"></script>
  </body>
</html>
