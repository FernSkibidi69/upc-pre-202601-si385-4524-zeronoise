<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Dashboard de gestión</title>
    <link rel="stylesheet" href="css/dashboard_tiempo.css" />
  </head>
  <body>
    <div class="metrics-container">
      <div class="logo">🔊 NoiseGuard</div>
      <h2>Dashboard de gestión</h2>
      <p class="subtitle">
        Tiempo promedio entre reporte ciudadano y asignación a inspector.
      </p>

      <!-- Escenario 1: Métrica mensual -->
      <div class="metric-card">
        <div class="metric-icon">⏱️</div>
        <div>
          <div class="metric-value" id="avgTime">2.3 días</div>
          <div class="metric-label">
            Tiempo promedio de asignación (este mes)
          </div>
        </div>
      </div>

      <!-- Escenario 2: Benchmark comparativo -->
      <div class="benchmark-toggle">
        <label class="checkbox-label">
          <input
            type="checkbox"
            id="benchmarkToggle"
            onchange="toggleBenchmark()"
          />
          Comparar con San Borja
        </label>
      </div>

      <div class="benchmark-panel" id="benchmarkPanel">
        <div class="benchmark-row">
          <span class="benchmark-name">Lima Cercado</span>
          <div class="benchmark-bar-wrapper">
            <div class="benchmark-bar lima" style="width: 76%"></div>
          </div>
          <span class="benchmark-value">2.3 días</span>
        </div>
        <div class="benchmark-row">
          <span class="benchmark-name">San Borja</span>
          <div class="benchmark-bar-wrapper">
            <div class="benchmark-bar borja" style="width: 60%"></div>
          </div>
          <span class="benchmark-value">1.8 días</span>
        </div>
      </div>
    </div>

    <script src="js/dashboard_tiempo.js"></script>
  </body>
</html>
