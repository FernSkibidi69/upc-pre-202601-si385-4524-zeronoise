<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoiseGuard - Comparación de operativo</title>
    <link rel="stylesheet" href="css/comparacion_operativo.css" />
  </head>
  <body>
    <div class="compare-container">
      <div class="logo">🔊 NoiseGuard</div>
      <h2>Comparación de impacto</h2>
      <p class="subtitle">
        Compara el ruido antes y después de un operativo de control.
      </p>

      <div class="date-selectors">
        <div class="date-group">
          <label for="dateBefore">Fecha "antes"</label>
          <input type="date" id="dateBefore" value="2026-04-14" />
        </div>
        <div class="date-group">
          <label for="dateAfter">Fecha "después"</label>
          <input type="date" id="dateAfter" value="2026-04-16" />
        </div>
      </div>

      <button class="compare-btn" onclick="compareData()">Comparar</button>

      <!-- Escenario 1: Análisis de impacto (gráficos lado a lado) -->
      <div class="charts-row" id="chartsRow">
        <div class="chart-col">
          <div class="chart-label">Antes</div>
          <svg
            id="chartBefore"
            viewBox="0 0 180 140"
            xmlns="http://www.w3.org/2000/svg"
          ></svg>
        </div>
        <div class="chart-col">
          <div class="chart-label">Después</div>
          <svg
            id="chartAfter"
            viewBox="0 0 180 140"
            xmlns="http://www.w3.org/2000/svg"
          ></svg>
        </div>
      </div>

      <!-- Escenario 2: Indicador de éxito -->
      <div class="success-indicator" id="successIndicator">
        <span class="success-icon">✅</span>
        <span id="successText"
          >Reducción del 23% en dB máximos después del operativo</span
        >
      </div>
    </div>

    <script src="js/comparacion_operativo.js"></script>
  </body>
</html>
